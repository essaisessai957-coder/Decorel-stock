<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECOREL — Gestion Stock</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Cairo:wght@400;600;700;800&display=swap');
:root{
  --bg:#f4f8f6;--card:#fff;--card2:#eef5f1;--border:#c2d9cf;
  --text:#1a2e27;--muted:#5a7a6e;
  --ok:#1e7d52;--warn:#c8956c;--crit:#dc2626;
  --primary:#2d6e5e;--p2:#1e4d40;--pl:#eef5f1;
  --gold:#c8956c;--gold2:#a87040;--purple:#7c3aed;
  --font:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);}
#LS{position:fixed;inset:0;background:linear-gradient(135deg,#0d2b24,#1e4d40,#2d6e5e);
  display:flex;align-items:center;justify-content:center;z-index:1000;}
.lbox{background:#fff;border-radius:20px;padding:36px 44px;width:360px;
  box-shadow:0 24px 64px rgba(0,0,0,.3);text-align:center;position:relative;}
.lbox img{width:120px;height:120px;object-fit:contain;margin-bottom:4px;}
.lsub{font-size:.67rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.lf{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;text-align:left;}
.lf label{font-size:.63rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.lf input{padding:9px 12px;border:2px solid var(--border);border-radius:7px;font-family:var(--font);font-size:.86rem;outline:none;}
.lf input:focus{border-color:var(--primary);}
.lbtn{width:100%;padding:11px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--primary),var(--p2));
  color:#fff;font-family:var(--font);font-size:.86rem;font-weight:800;cursor:pointer;margin-top:3px;}
.lerr{color:var(--crit);font-size:.74rem;min-height:17px;margin-top:5px;}
.ldeco{position:absolute;bottom:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--primary),var(--gold),var(--primary));border-radius:0 0 20px 20px;}
#app{display:none;flex-direction:column;height:100vh;}
#app.on{display:flex;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 .8rem;height:50px;
  background:linear-gradient(135deg,var(--p2),var(--primary));border-bottom:3px solid var(--gold);flex-shrink:0;}
.hlogo{display:flex;align-items:center;gap:8px;}
.hlogo img{height:34px;width:34px;border-radius:7px;object-fit:contain;background:#fff;padding:3px;}
.hlogo-t{font-size:.95rem;font-weight:800;letter-spacing:3px;color:#fff;}
.hlogo-t em{color:var(--gold);font-style:normal;}
.mnav-wrap{display:flex;gap:2px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:7px;padding:3px;flex-wrap:wrap;max-width:480px;}
.mn{padding:3px 7px;border-radius:4px;border:none;background:transparent;
  color:rgba(255,255,255,.7);font-family:var(--font);font-size:.67rem;font-weight:700;cursor:pointer;}
.mn:hover{color:#fff;}.mn.on{background:#fff;color:var(--primary);font-weight:800;}
.hbr{display:flex;gap:3px;align-items:center;}
.hc{padding:3px 7px;border-radius:5px;border:1px solid rgba(255,255,255,.22);background:transparent;
  color:rgba(255,255,255,.8);font-family:var(--font);font-size:.63rem;font-weight:600;cursor:pointer;}
.hc:hover{background:rgba(255,255,255,.12);}
.hc.red:hover{border-color:#fca5a5;color:#fca5a5;}
.hlng{padding:3px 7px;border-radius:5px;border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.1);color:#fff;font-family:var(--font);font-size:.67rem;font-weight:700;cursor:pointer;}
.hout{padding:3px 7px;border-radius:5px;border:1px solid rgba(255,160,100,.35);
  background:transparent;color:#fcd5a8;font-family:var(--font);font-size:.63rem;font-weight:600;cursor:pointer;}
  .hc.dash{background:var(--primary);color:#fff;font-weight:700;font-size:.63rem}
  .mn.bard{background:linear-gradient(135deg,#78350f,#b45309);color:#fef3c7;border-color:#b45309}
  .mn.bard.on{background:linear-gradient(135deg,#b45309,#d97706);color:#fff;border-color:#d97706}
  .bard-kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .bard-card{background:var(--card);border:2px solid #b45309;border-radius:10px;padding:14px}
  .bard-v{font-size:1.6rem;font-weight:900;font-family:'JetBrains Mono',monospace;color:#b45309}
  .bard-l{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .bard-s{font-size:.62rem;color:var(--muted);margin-top:2px}
  .bard-bar{background:#fef3c7;border-radius:6px;height:14px;margin:8px 0;overflow:hidden}
  .bard-fill{height:14px;border-radius:6px;background:linear-gradient(90deg,#b45309,#d97706)}
  .bard-btn{background:linear-gradient(135deg,#b45309,#d97706);color:#fff;border:none;border-radius:7px;padding:10px 0;font-weight:800;font-size:.78rem;cursor:pointer;width:100%;margin-top:8px;letter-spacing:.5px}
  .bard-btn.out{background:linear-gradient(135deg,#dc2626,#ef4444)}
  .bard-ji{background:var(--card);border:1px solid #b45309;border-radius:7px;padding:8px 10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .bard-jq{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:.85rem}
  .bard-jq.ep{color:var(--ok)}
  .bard-jq.sp{color:var(--danger)}
  .hc.dash.on{background:#16a34a;color:#fff}
  .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .dash-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .dkpi{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:14px 16px}
  .dkpi-l{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .dkpi-v{font-size:1.4rem;font-weight:900;color:var(--primary);font-family:'JetBrains Mono',monospace;line-height:1.1}
  .dkpi-s{font-size:.62rem;color:var(--muted);margin-top:2px}
  .dkpi.gold .dkpi-v{color:var(--gold2)}
  .dkpi.ok .dkpi-v{color:#16a34a}
  .dkpi.purple .dkpi-v{color:var(--purple)}
  .dtitle{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:14px 0 8px;border-bottom:2px solid var(--border);padding-bottom:4px;font-weight:700}
  .dbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.72rem}
  .dbar-lbl{width:110px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
  .dbar-track{flex:1;background:var(--border);border-radius:4px;height:10px;overflow:hidden}
  .dbar-fill{height:10px;border-radius:4px;background:var(--primary)}
  .dbar-val{width:80px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--primary);font-size:.7rem;flex-shrink:0}
  .pack-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:12px 14px}
  .pack-name{font-weight:900;font-size:.9rem;color:var(--primary);margin-bottom:4px}
  .pack-items{font-size:.67rem;color:var(--muted);margin-bottom:8px}
  .pack-dispo{font-size:1.2rem;font-weight:900;font-family:'JetBrains Mono',monospace}
  .pack-coul{font-size:.62rem;margin-top:4px;color:var(--muted)}
  .pack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.abody{display:grid;grid-template-columns:238px 1fr 315px;flex:1;overflow:hidden;}
/* LEFT */
.left{border-right:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--card);}
.phdr{padding:6px 11px;font-family:'JetBrains Mono',monospace;font-size:.53rem;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--card2);}
.clist{flex:1;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:4px;}
.clist::-webkit-scrollbar{width:3px;}.clist::-webkit-scrollbar-thumb{background:var(--border);}
.cc{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;}
.cc.ok{border-left:3px solid var(--ok);}.cc.warn{border-left:3px solid var(--gold);}
.cc.crit{border-left:3px solid var(--crit);background:#fff5f5;}
.cc.shared{border-left:3px solid var(--purple);background:#faf5ff;}
.cct{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
.ccn{font-size:.71rem;font-weight:700;}.ccd{font-family:'JetBrains Mono',monospace;font-size:.53rem;color:var(--muted);}
.cbars{display:flex;flex-direction:column;gap:2px;margin:3px 0;}
.cbr{display:flex;align-items:center;gap:4px;}
.cbl{width:28px;font-size:.55rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.cbt{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.cbf{height:100%;border-radius:2px;}
.cbv{width:24px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.59rem;}
.ccs{font-size:.53rem;font-weight:700;padding:1px 5px;border-radius:3px;display:inline-block;margin-top:2px;}
.ccs.ok{background:#d1fae5;color:var(--ok);}.ccs.warn{background:#fef3e8;color:var(--gold2);}
.ccs.crit{background:#fee2e2;color:var(--crit);}.ccs.shared{background:#ede9fe;color:var(--purple);}
/* CENTER */
.center{overflow-y:auto;padding:.7rem .9rem;display:flex;flex-direction:column;gap:.7rem;background:var(--bg);}
.center::-webkit-scrollbar{width:3px;}.center::-webkit-scrollbar-thumb{background:var(--border);}
.slbl{font-family:'JetBrains Mono',monospace;font-size:.53rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.kpi-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.kpi{background:var(--card);border:2px solid var(--border);border-radius:9px;padding:9px 11px;}
.kpi.hi{border-color:var(--primary);}
.kpi-l{font-family:'JetBrains Mono',monospace;font-size:.51rem;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
.kpi-v{font-size:1.1rem;font-weight:800;color:var(--primary);}
.kpi-v.gold{color:var(--gold2);}
.kpi-s{font-size:.57rem;color:var(--muted);margin-top:1px;}
.stk-bois-wrap{background:var(--card);border:2px solid var(--border);border-radius:9px;overflow:hidden;}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.mc{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:8px 10px;position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.mc.blanc::before{background:var(--primary);}.mc.sonoma::before{background:#3d9b7a;}
.mc.noir::before{background:#4b5563;}.mc.marron::before{background:var(--gold);}
.mcl{font-family:'JetBrains Mono',monospace;font-size:.51rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.mcn{font-size:2rem;font-weight:800;line-height:1.1;}.mcs{font-size:.56rem;color:var(--muted);}
.cstk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.cstk-card{border-radius:8px;padding:8px 10px;text-align:center;border:2px solid transparent;}
.cstk-card.blanc{background:#dbeafe;border-color:#93c5fd;color:#1e40af;}
.cstk-card.sonoma{background:#dcfce7;border-color:#86efac;color:#166534;}
.cstk-card.noir{background:#374151;border-color:#6b7280;color:#f3f4f6;}
.cstk-card.marron{background:#fef3c7;border-color:#d4a06a;color:#92400e;}
.cstk-lbl{font-family:'JetBrains Mono',monospace;font-size:.51rem;letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:2px;}
.cstk-num{font-size:1.8rem;font-weight:800;line-height:1;}
.cstk-sub{font-size:.55rem;opacity:.75;margin-top:1px;}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.pc{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:7px 9px;}
.pct{font-family:'JetBrains Mono',monospace;font-size:.51rem;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
.pcv{font-size:1.05rem;font-weight:800;color:var(--primary);}
.pcs{font-size:.55rem;color:var(--muted);margin-top:1px;}
.val-box{background:var(--card);border:2px solid var(--primary);border-radius:9px;padding:10px 12px;}
.val-title{font-family:'JetBrains Mono',monospace;font-size:.53rem;letter-spacing:2px;color:var(--primary);text-transform:uppercase;margin-bottom:6px;font-weight:700;}
.val-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--border);}
.val-row:last-child{border-bottom:none;}
.val-lbl{font-size:.69rem;color:var(--muted);}
.val-num{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--primary);}
.val-detail{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);}
.mbox{background:var(--card);border:2px solid var(--border);border-radius:9px;overflow:hidden;}
.mbhdr{background:#fef8f4;border-bottom:2px solid #f5d8b8;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;}
.mbht{font-size:.73rem;font-weight:700;color:var(--gold2);}
.mqbs{display:flex;gap:2px;}
.mqb{padding:2px 6px;border-radius:4px;border:2px solid var(--border);background:#fff;
  color:var(--muted);font-size:.57rem;font-weight:700;cursor:pointer;}
.mqb.on,.mqb:hover{border-color:var(--primary);color:var(--primary);background:var(--pl);}
table{width:100%;border-collapse:collapse;font-size:.72rem;}
thead th{padding:5px 8px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:.51rem;
  letter-spacing:1px;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);background:var(--card2);}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--pl);}
td{padding:5px 8px;vertical-align:middle;}
.tn{font-weight:700;}.tdm{font-family:'JetBrains Mono',monospace;font-size:.59rem;color:var(--muted);}
.tnr{font-family:'JetBrains Mono',monospace;font-weight:700;text-align:right;}
.tnr.ok{color:var(--ok);}.tnr.warn{color:var(--gold2);}.tnr.crit{color:var(--crit);}
.pl{display:inline-flex;align-items:center;padding:1px 5px;border-radius:20px;font-size:.54rem;font-weight:700;}
.pl.ok{background:#d1fae5;color:var(--ok);}.pl.warn{background:#fef3e8;color:var(--gold2);}
.pl.crit{background:#fee2e2;color:var(--crit);}
/* RIGHT */
.right{border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--card);}
.trow{display:flex;border-bottom:2px solid var(--border);background:var(--card2);}
.tb{flex:1;padding:7px 3px;border:none;background:transparent;color:var(--muted);
  font-family:var(--font);font-size:.63rem;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;}
.tb.on{color:var(--primary);border-bottom-color:var(--primary);background:#fff;}
.tc{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.fw{flex:1;overflow-y:auto;padding:8px;}
.fw::-webkit-scrollbar{width:3px;}.fw::-webkit-scrollbar-thumb{background:var(--border);}
.f{display:flex;flex-direction:column;gap:2px;margin-bottom:5px;}
.f label{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
.f input,.f select,.f textarea{background:var(--card2);border:2px solid var(--border);border-radius:6px;
  padding:5px 7px;color:var(--text);font-family:var(--font);font-size:.74rem;outline:none;width:100%;}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--primary);}
.f textarea{resize:none;height:42px;font-size:.7rem;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
/* 5 TYPE BUTTONS */
.type5{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:6px;}
.t5btn{padding:7px 3px;border-radius:7px;border:2px solid var(--border);background:var(--card2);
  color:var(--muted);font-family:var(--font);font-size:.6rem;font-weight:700;cursor:pointer;
  text-align:center;line-height:1.3;white-space:pre-line;}
.t5btn:hover{border-color:var(--primary);color:var(--primary);}
.t5btn.on.ep{background:#d1fae5;color:var(--ok);border-color:#6ee7b7;}
.t5btn.on.sp{background:#fee2e2;color:var(--crit);border-color:#fca5a5;}
.t5btn.on.as{background:#ede9fe;color:var(--purple);border-color:#c4b5fd;}
.t5btn.on.em{background:#e0f2fe;color:#0369a1;border-color:#7dd3fc;}
.t5btn.on.sm{background:#fef3e8;color:var(--gold2);border-color:#fcd9aa;}
.src-wrap{border:2px solid var(--border);border-radius:7px;padding:6px 8px;margin-bottom:5px;background:var(--card2);}
.src-title{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:1.5px;
  color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:3px;}
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.srcbtn{padding:5px 3px;border-radius:5px;border:2px solid var(--border);background:#fff;
  color:var(--muted);font-family:var(--font);font-size:.59rem;font-weight:700;cursor:pointer;text-align:center;line-height:1.2;}
.srcbtn.on,.srcbtn:hover{border-color:var(--primary);color:var(--primary);background:var(--pl);}
.msel{border:2px solid var(--border);border-radius:7px;padding:6px 8px;margin-bottom:5px;background:var(--card2);}
.msel-t{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:1.5px;
  color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:3px;}
.mmt-row{display:flex;gap:2px;margin-bottom:4px;flex-wrap:wrap;}
.mmt{padding:3px 5px;border-radius:4px;border:2px solid var(--border);background:#fff;
  font-family:var(--font);font-size:.58rem;font-weight:700;cursor:pointer;color:var(--muted);}
.mmt.on{border-color:var(--primary);color:var(--primary);background:var(--pl);}
.coul-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.coulbtn{padding:5px 3px;border-radius:6px;border:2px solid transparent;
  font-family:var(--font);font-size:.59rem;font-weight:700;cursor:pointer;text-align:center;}
.coulbtn.blanc{background:#dbeafe;color:#1e40af;border-color:#93c5fd;}
.coulbtn.sonoma{background:#dcfce7;color:#166534;border-color:#86efac;}
.coulbtn.noir{background:#374151;color:#f3f4f6;border-color:#6b7280;}
.coulbtn.marron{background:#fef3c7;color:#92400e;border-color:#d4a06a;}
.coulbtn.on{transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.18);}
.dispo-wrap{border-radius:7px;padding:5px 8px;margin:3px 0;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:.71rem;font-weight:800;}
.dispo-wrap.ok{background:#d1fae5;color:var(--ok);border:2px solid #6ee7b7;}
.dispo-wrap.warn{background:#fef3e8;color:var(--gold2);border:2px solid #fcd9aa;}
.dispo-wrap.crit{background:#fee2e2;color:var(--crit);border:2px solid #fca5a5;}
/* Assemblage manquants */
.asm-manq{background:#fff5f5;border:2px solid #fca5a5;border-radius:7px;padding:7px 9px;margin:4px 0;}
.asm-manq-t{font-size:.68rem;font-weight:800;color:var(--crit);margin-bottom:4px;}
.asm-manq li{font-size:.67rem;color:var(--crit);margin-left:12px;line-height:1.7;}
.asm-ok{background:#d1fae5;border:2px solid #6ee7b7;border-radius:7px;padding:7px 9px;margin:4px 0;
  font-size:.72rem;font-weight:700;color:var(--ok);}
.sep{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;border-top:1px solid var(--border);padding-top:5px;margin-top:2px;margin-bottom:4px;}
/* Multi entry */
.multi-wrap{border:2px solid var(--primary);border-radius:8px;overflow:hidden;margin-bottom:5px;}
.multi-hdr{background:var(--primary);color:#fff;padding:5px 9px;font-family:'JetBrains Mono',monospace;
  font-size:.54rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.multi-add{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;
  font-family:var(--font);font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:4px;cursor:pointer;}
.multi-add:hover{background:rgba(255,255,255,.35);}
.multi-row{display:grid;grid-template-columns:1fr auto 52px 26px;gap:3px;align-items:center;padding:4px 7px;border-bottom:1px solid var(--border);}
.multi-row:last-child{border-bottom:none;}
.multi-row select,.multi-row input{border:1px solid var(--border);border-radius:4px;padding:3px 5px;
  font-family:var(--font);font-size:.68rem;background:var(--card2);color:var(--text);width:100%;}
.multi-row select:focus,.multi-row input:focus{border-color:var(--primary);outline:none;}
.multi-del{background:#fee2e2;border:1px solid #fca5a5;color:var(--crit);border-radius:4px;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;font-weight:800;flex-shrink:0;}
.coul-mini{width:100%;border:1px solid var(--border);border-radius:4px;padding:3px 4px;
  font-family:var(--font);font-size:.66rem;background:var(--card2);color:var(--text);}
.bsub{width:100%;padding:9px;border-radius:7px;border:none;
  background:linear-gradient(135deg,var(--primary),var(--p2));
  color:#fff;font-family:var(--font);font-size:.79rem;font-weight:800;cursor:pointer;margin-top:3px;}
.bsub:hover{opacity:.9;}.bsub:disabled{opacity:.4;cursor:not-allowed;}
.bsub.asm{background:linear-gradient(135deg,var(--purple),#5b21b6);}
/* JOURNAL */
.jw{flex:1;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:3px;}
.jw::-webkit-scrollbar{width:3px;}.jw::-webkit-scrollbar-thumb{background:var(--border);}
.aide{background:#fffbeb;border:2px solid #fde68a;border-radius:8px;padding:7px 9px;margin:5px;font-size:.65rem;color:#78350f;line-height:1.5;}
.aide strong{display:block;font-size:.68rem;margin-bottom:2px;color:#92400e;}
.ji{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;}
.ji.ep{border-left:3px solid var(--ok);}.ji.sp{border-left:3px solid var(--crit);}
.ji.as{border-left:3px solid var(--purple);}.ji.em{border-left:3px solid #0369a1;}
.ji.sm{border-left:3px solid var(--gold);}
.jir{display:flex;justify-content:space-between;align-items:flex-start;}
.jic{font-size:.68rem;font-weight:700;}
.jim{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--muted);margin-top:1px;}
.jiq{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;}
.jiq.ep{color:var(--ok);}.jiq.sp{color:var(--crit);}.jiq.as{color:var(--purple);}
.jiq.em{color:#0369a1;}.jiq.sm{color:var(--gold2);}
/* grouped journal */
.ji-group{background:var(--card);border:2px solid var(--primary);border-radius:8px;overflow:hidden;}
.ji-group-hdr{background:var(--pl);padding:6px 9px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.ji-group-t{font-size:.69rem;font-weight:800;color:var(--primary);}
.ji-group-sub{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--muted);}
.ji-group-rows{padding:4px 6px;display:flex;flex-direction:column;gap:2px;}
.ji-group-row{display:flex;justify-content:space-between;font-size:.67rem;padding:2px 0;border-bottom:1px solid var(--border);}
.ji-group-row:last-child{border-bottom:none;}
.jia{display:flex;gap:3px;margin-top:3px;padding:0 9px 5px;}
.jib{padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:#fff;
  color:var(--muted);font-size:.55rem;font-weight:600;cursor:pointer;}
.jib:hover{border-color:var(--gold2);color:var(--gold2);}
.jib.del:hover{border-color:var(--crit);color:var(--crit);}
/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.mbg.on{display:flex;}
.modal{background:#fff;border:2px solid var(--border);border-radius:13px;padding:17px;
  width:355px;max-width:95vw;box-shadow:0 20px 40px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto;}
.mtitle{font-size:.83rem;font-weight:800;color:var(--primary);margin-bottom:10px;}
.macts{display:flex;gap:6px;margin-top:10px;}
.mbtn{flex:1;padding:7px;border-radius:6px;border:none;font-family:var(--font);font-size:.73rem;font-weight:700;cursor:pointer;}
.mbtn.sv{background:var(--primary);color:#fff;}.mbtn.ca{background:var(--card2);color:var(--muted);}
.toast{position:fixed;bottom:14px;right:14px;background:#fff;border:2px solid var(--border);
  border-radius:9px;padding:7px 13px;font-size:.74rem;font-weight:700;z-index:999;
  animation:su .2s ease;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.1);}
@keyframes su{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.toast.ok{border-color:var(--ok);color:var(--ok);}
.toast.crit{border-color:var(--crit);color:var(--crit);}
.toast.warn{border-color:var(--gold2);color:var(--gold2);}
.toast.info{border-color:#0369a1;color:#0369a1;}
.toast.asm{border-color:var(--purple);color:var(--purple);}
</style>
</head>

function ini(){
  const d={shared:{jenab:{Blanc:0,Sonoma:0,Noir:0,Marron:0},gharghar:0,journal:[]},bardage:{stock:0,journal:[]}};
  Object.keys(MODS).forEach(m=>{

    MODS[m].mdf.forEach(x=>{
      if(!x.shared) d[m].mdf[x.key]={Blanc:0,Sonoma:0,Noir:0,Marron:0};
    });
  });
  return d;
}

function mergeRaw(raw){
  const base=ini();
  if(!raw||typeof raw!=='object')return base;
  if(raw.shared){
    if(raw.shared.jenab)Object.assign(base.shared.jenab,raw.shared.jenab);
    if(raw.shared.gharghar!==undefined)base.shared.gharghar=raw.shared.gharghar;
    if(raw.shared.journal)base.shared.journal=raw.shared.journal;
  }
  if(raw.bardage){
    if(raw.bardage.journal)base.bardage.journal=raw.bardage.journal;
  }
  Object.keys(base).forEach(m=>{
    if(m==='shared'||m==='bardage')return;
    if(raw[m]){
      base[m].journal=raw[m].journal||[];
      if(isMJER(m)){base[m].ghr=raw[m].ghr||0;base[m].iso_b=raw[m].iso_b||0;base[m].iso_r=raw[m].iso_r||0;}
      if(raw[m].mdf)Object.assign(base[m].mdf,raw[m].mdf);
    }
  });
  return base;
}

// Get stock of a specific component for a model
function getCompStk(d,model,comp,col){
  if(comp.shared||comp.key==='jenab'){
    return d.shared.jenab[col]||0;
  }
  if(comp.key==='gharghar'){
    return d.shared.gharghar||0;
  }
  // specific to model
  const mj=(d[model].journal||[]).filter(j=>!j.deleted&&j.cat==='pieces'&&j.c===comp.key);
  let base=d[model].mdf?.[comp.key]?.[col]||0;
  mj.forEach(j=>{if(!col||j.col===col)base+=(j.t==='ep'?+j.q:-j.q);});
  return Math.max(0,base);
}

// Full stock calculation using journal
function getStk(model){
  const d=gd(),m=MODS[model];
  const r={mdf:{},ghr:0,iso_b:0,iso_r:0};
  // shared
  r.jenab={...d.shared.jenab};
  r.gharghar=d.shared.gharghar||0;
  // Apply journal for shared
  // (shared journal stored in d.shared.journal)
  const sharedJ=d.shared?.journal||[];
  sharedJ.filter(j=>!j.deleted).forEach(j=>{
    const q=j.t==='ep'?+j.q:-j.q;
    if(j.c==='jenab'){r.jenab[j.col]=(r.jenab[j.col]||0)+q;}
    if(j.c==='gharghar'){r.gharghar=(r.gharghar||0)+q;}
  });
  // specific mdf
  m.mdf.forEach(x=>{
    if(!x.shared){
      r.mdf[x.key]={...(d[model].mdf?.[x.key]||{Blanc:0,Sonoma:0,Noir:0,Marron:0})};
    }
  });
  if(isMJER(model)){r.ghr=d[model].ghr||0;r.iso_b=d[model].iso_b||0;r.iso_r=d[model].iso_r||0;}
  // apply model journal for non-shared
  (d[model].journal||[]).filter(j=>!j.deleted&&j.cat==='pieces').forEach(j=>{
    const q=j.t==='ep'?+j.q:-j.q;
    if(j.c==='jenab'){r.jenab[j.col]=(r.jenab[j.col]||0)+q;}
    else if(j.c==='gharghar'){r.gharghar=(r.gharghar||0)+q;}
    else if(j.c==='ghr'){r.ghr=(r.ghr||0)+q;}
    else if(j.c==='iso_b'){r.iso_b=(r.iso_b||0)+q;}
    else if(j.c==='iso_r'){r.iso_r=(r.iso_r||0)+q;}
    else if(j.c&&r.mdf[j.c]!==undefined){r.mdf[j.c][j.col]=(r.mdf[j.c][j.col]||0)+q;}
  });
  // ensure non-negative
  COUL.forEach(c=>{r.jenab[c]=Math.max(0,r.jenab[c]||0);});
  r.gharghar=Math.max(0,r.gharghar);r.ghr=Math.max(0,r.ghr);
  r.iso_b=Math.max(0,r.iso_b);r.iso_r=Math.max(0,r.iso_r);
  Object.keys(r.mdf).forEach(k=>COUL.forEach(c=>r.mdf[k][c]=Math.max(0,r.mdf[k][c]||0)));
  return r;
}

function getCompStockVal(model,coul,s){
  const m=MODS[model],nm=coul==='Noir'||coul==='Marron',pMDF=nm?PMDF.NM:PMDF.BS;
  let v=0;
  m.mdf.forEach(d=>{
    const qty=d.shared?(d.key==='jenab'?s.jenab[coul]||0:0):s.mdf[d.key]?.[coul]||0;
    v+=(qty/d.pf)*pMDF;
  });
  return v;
}

function getPossible(model){
  const s=getStk(model),m=MODS[model],res={};
  COUL.forEach(c=>{
    const v=m.mdf.map(d=>{
      const qty=d.shared?(d.key==='jenab'?s.jenab[c]||0:s.gharghar||0)
                        :s.mdf[d.key]?.[c]||0;
      return Math.floor(qty/d.pm);
    });
    if(isMJER(model)){
      v.push(Math.floor((s.gharghar||0)/m.gh.pm));
      v.push(Math.floor((s.ghr||0)/m.ghr.pm));
      v.push(Math.floor(((s.iso_b||0)+(s.iso_r||0))/m.iso.pm));
    }
    res[c]=Math.max(0,Math.min(...v));
  });
  return res;
}

function getMQ(model,coul){
  const s=getStk(model),m=MODS[model],res=[];
  m.mdf.forEach(d=>{
    const have=d.shared?(d.key==='jenab'?s.jenab[coul]||0:s.gharghar||0):s.mdf[d.key]?.[coul]||0;
    res.push({nom:d.nom,dim:d.dim,have,need:d.pm,manq:Math.max(0,d.pm-have),shared:!!d.shared});
  });
  if(isMJER(model)){
    res.push({nom:'Gharghar',dim:m.gh.dim,have:s.gharghar||0,need:m.gh.pm,manq:Math.max(0,m.gh.pm-(s.gharghar||0)),shared:true});
    res.push({nom:'Gherghar',dim:m.ghr.dim,have:s.ghr||0,need:m.ghr.pm,manq:Math.max(0,m.ghr.pm-(s.ghr||0))});
    const iT=(s.iso_b||0)+(s.iso_r||0);
    res.push({nom:'ISOREAL',dim:m.iso.dim,have:iT,need:m.iso.pm,manq:Math.max(0,m.iso.pm-iT)});
  }
  return res;
}

// Check if can assemble qty of model/coul
function checkAssembly(model,coul,qty){
  const s=getStk(model),m=MODS[model],missing=[];
  m.mdf.forEach(d=>{
    const need=d.pm*qty;
    const have=d.shared?(d.key==='jenab'?s.jenab[coul]||0:s.gharghar||0):s.mdf[d.key]?.[coul]||0;
    if(have<need)missing.push({nom:d.nom,have,need,manq:need-have,shared:!!d.shared});
  });
  if(isMJER(model)){
    const ghNeed=m.gh.pm*qty,ghHave=s.gharghar||0;
    if(ghHave<ghNeed)missing.push({nom:'Gharghar',have:ghHave,need:ghNeed,manq:ghNeed-ghHave,shared:true});
    const ghrNeed=m.ghr.pm*qty,ghrHave=s.ghr||0;
    if(ghrHave<ghrNeed)missing.push({nom:'Gherghar',have:ghrHave,need:ghrNeed,manq:ghrNeed-ghrHave});
    const isoNeed=m.iso.pm*qty,isoHave=(s.iso_b||0)+(s.iso_r||0);
    if(isoHave<isoNeed)missing.push({nom:'ISOREAL',have:isoHave,need:isoNeed,manq:isoNeed-isoHave});
  }
  return missing;
}

function getValDetail(model){
  // MÉTHODE A : Valeur MDF = Possibles_propres × (prix_feuille / mpf)
  // 1 feuille MDF → mpf MJER complets → coût MDF par MJER = prix/mpf
  // "Possibles propres" = min calculé sur composants MDF propres UNIQUEMENT (hors Jenab/Gharghar partagés)
  const s=getStk(model),m=MODS[model];
  // Calculer possibles sur composants propres MDF seulement
  const posPropres={};
  COUL.forEach(c=>{
    const vals=m.mdf.filter(d=>!d.shared).map(d=>Math.floor((s.mdf[d.key]?.[c]||0)/d.pm));
    posPropres[c]=vals.length>0?Math.max(0,Math.min(...vals)):0;
  });
  const posBS=(posPropres.Blanc||0)+(posPropres.Sonoma||0);
  const posNM=(posPropres.Noir||0)+(posPropres.Marron||0);
  const mdfBS=posBS*(PMDF.BS/m.mpf);
  const mdfNM=posNM*(PMDF.NM/m.mpf);
  let ghr=0,isoB=0,isoR=0;
  if(isMJER(model)){
    ghr=(s.ghr||0)*(750/m.ghr.pf);
    isoB=(s.iso_b||0)*(115/m.iso.pf);
    isoR=(s.iso_r||0)*(95/m.iso.pf);
  }
  return{mdfBS,mdfNM,ghr,isoB,isoR,posBS,posNM,total:mdfBS+mdfNM+ghr+isoB+isoR};
}

function getSharedVal(){
  // Stock partagé — lu une seule fois depuis d.shared.journal
  const d=gd();
  const jenab={Blanc:0,Sonoma:0,Noir:0,Marron:0};
  let gharghar=0;
  // base
  Object.assign(jenab, d.shared?.jenab||{});
  gharghar=d.shared?.gharghar||0;
  // apply journal
  (d.shared?.journal||[]).filter(j=>!j.deleted).forEach(j=>{
    const q=j.t==='ep'?+j.q:-j.q;
    if(j.c==='jenab'&&j.col) jenab[j.col]=(jenab[j.col]||0)+q;
    if(j.c==='gharghar') gharghar=(gharghar||0)+q;
  });
  COUL.forEach(c=>jenab[c]=Math.max(0,jenab[c]||0));
  gharghar=Math.max(0,gharghar);
  const jenabB=(jenab.Blanc||0)+(jenab.Sonoma||0);
  const jenabN=(jenab.Noir||0)+(jenab.Marron||0);
  const jVal=(jenabB/24)*PMDF.BS+(jenabN/24)*PMDF.NM;
  const ghVal=gharghar*(750/203);
  return {jVal,ghVal,total:jVal+ghVal,jenab,gharghar};
}

function getStkBoisTotal(){
  const res={};
  Object.keys(MODS).forEach(model=>{
    const s=getStk(model),m=MODS[model];
    let pieces=0;
    m.mdf.forEach(d=>{
      if(!d.shared){COUL.forEach(c=>{pieces+=s.mdf[d.key]?.[c]||0;});}
    });
    if(isMJER(model)){pieces+=(s.ghr||0)+(s.iso_b||0)+(s.iso_r||0);}
    res[model]={pieces,valeur:getValDetail(model).total};
  });
  const sh=getSharedVal();
  COUL.forEach(c=>res['__shared_jenab_'+c]=sh.jenab[c]||0);
  return res;
}

  h+=`<div class="cc ${jenabLv} shared"><div class="cct"><span class="ccn">Jenab <span style="font-size:.56rem;color:var(--purple)">⚡partagé</span></span><span class="ccd">13×25</span></div>
  <div class="cbars">${COUL.map(c=>{const v=jenabB[c]||0,cl=alv(v,SEUIL*2),p=Math.min(100,(v/mx1)*100);
    return `<div class="cbr"><span class="cbl">${c.substring(0,3)}</span>
    <div class="cbt"><div class="cbf" style="width:${p}%;background:${bc(cl)}"></div></div>
    <span class="cbv" style="color:${bc(cl)}">${v}</span></div>`;}).join('')}</div>
  <span class="ccs shared">⚡ Tous MJER</span></div>`;
  const ghP=Math.min(100,(gh/(SEUIL*4||1))*100);
  h+=`<div class="cc ${ghLv} shared"><div class="cct"><span class="ccn">Gharghar <span style="font-size:.56rem;color:var(--purple)">⚡partagé</span></span><span class="ccd">24×11</span></div>
  <div class="cbars"><div class="cbr"><span class="cbl">Stk</span>
  <div class="cbt"><div class="cbf" style="width:${ghP}%;background:${bc(ghLv)}"></div></div>
  <span class="cbv" style="color:${bc(ghLv)}">${gh}</span></div></div>
  <span class="ccs shared">⚡ Tous MJER</span></div>`;
  } // end isMJER shared block
  // model-specific mdf
  m.mdf.filter(d=>!d.shared).forEach(d=>{
    const sl=SEUIL*d.pm,vs=COUL.map(c=>s.mdf[d.key]?.[c]||0),lv=alv(Math.min(...vs),sl),mx=Math.max(...vs,sl)||1;
    h+=`<div class="cc ${lv}"><div class="cct"><span class="ccn">${d.nom}</span><span class="ccd">${d.dim}</span></div>
    <div class="cbars">${COUL.map((c,i)=>{const cl=alv(vs[i],sl),p=Math.min(100,(vs[i]/mx)*100);
      return `<div class="cbr"><span class="cbl">${c.substring(0,3)}</span>
      <div class="cbt"><div class="cbf" style="width:${p}%;background:${bc(cl)}"></div></div>
      <span class="cbv" style="color:${bc(cl)}">${vs[i]}</span></div>`;}).join('')}</div>
    <span class="ccs ${lv}">${lv==='crit'?'🔴':lv==='warn'?'🟡':'✅'} seuil ${sl}</span></div>`;
  });
  if(isMJER(CUR)){
    const ghr=s.ghr||0,ghrS=SEUIL*m.ghr.pm,ghrL=alv(ghr,ghrS),ghrP=Math.min(100,(ghr/(ghrS*2||1))*100);
    h+=`<div class="cc ${ghrL}"><div class="cct"><span class="ccn">Gherghar</span><span class="ccd">${m.ghr.dim}</span></div>
    <div class="cbars"><div class="cbr"><span class="cbl">Stk</span>
    <div class="cbt"><div class="cbf" style="width:${ghrP}%;background:${bc(ghrL)}"></div></div>
    <span class="cbv" style="color:${bc(ghrL)}">${ghr}</span></div></div>
    <span class="ccs ${ghrL}">${ghrL==='crit'?'🔴':ghrL==='warn'?'🟡':'✅'} seuil ${ghrS}</span></div>`;
    const iT=(s.iso_b||0)+(s.iso_r||0),iS=SEUIL*m.iso.pm,iL=alv(iT,iS),iP=Math.min(100,(iT/(iS*2||1))*100);
    h+=`<div class="cc ${iL}"><div class="cct"><span class="ccn">ISOREAL</span><span class="ccd">${m.iso.dim}</span></div>
    <div class="cbars">
    <div class="cbr"><span class="cbl">Blanc</span><div class="cbt"><div class="cbf" style="width:${iP}%;background:${bc(iL)}"></div></div><span class="cbv" style="color:${bc(iL)}">${s.iso_b||0}</span></div>
    <div class="cbr"><span class="cbl">Brute</span><div class="cbt"><div class="cbf" style="width:${iP}%;background:${bc(iL)}"></div></div><span class="cbv" style="color:${bc(iL)}">${s.iso_r||0}</span></div>
    </div><span class="ccs ${iL}">${iL==='crit'?'🔴':iL==='warn'?'🟡':'✅'} total ${iT} · seuil ${iS}</span></div>`;
  }
  document.getElementById('cl').innerHTML=h;
}

// RENDER CENTER

    ${model===CUR?'▶ ':''} ${model}</td>
    <td class="tnr ${lv}">${p}</td>
    <td class="tnr">${fmt(v)} DH</td>
    <td><span style="font-size:.54rem;padding:1px 5px;border-radius:3px;
    background:${isNICHE(model)?'#fce7f3':'#dbeafe'};color:${isNICHE(model)?'#be185d':'#1e40af'};font-weight:700">
    ${isNICHE(model)?'NICHE':'MJER'}</span></td></tr>`;

  h+=`<tr style="background:#faf5ff;border-top:2px solid var(--purple)">
    <td class="tn" style="color:var(--purple)">⚡ Jenab + Gharghar (partagés)</td>
    <td class="tnr" style="color:var(--purple)">${(sh.gharghar+Object.values(sh.jenab||{}).reduce((a,b)=>a+b,0))}</td>
    <td class="tnr" style="color:var(--purple)">${fmt(sh.total)} DH</td>

  h+=`</tbody></table></div></div>`;

  // Possibles
  h+=`<div><div class="slbl" style="color:${m.c}">${CUR} — Possibles (depuis pièces)</div>
  <div class="mgrid">${COUL.map(c=>{const vv=pos[c],cl=vv===0?'crit':vv<5?'warn':'ok';
    return `<div class="mc ${c.toLowerCase()}"><div class="mcl">${c}</div>
    <div class="mcn" style="color:${bc(cl)}">${vv}</div><div class="mcs">assemblables</div></div>`;}).join('')}</div></div>`;

  // Stock complets
  h+=`<div><div class="slbl">Stock Complets — ${CUR}</div>
  <div class="cstk-grid">${COUL.map(c=>{const vv=mc[c]||0,cl=vv===0?'crit':vv<3?'warn':'ok';
    return `<div class="cstk-card ${c.toLowerCase()}">

  h+=`<div><div class="slbl">Prix de revient / unité</div>

  <div class="val-row"><span class="val-lbl">MDF Noir/Marron <span class="val-detail">${vd.posNM} MJER × ${fmt(PMDF.NM/m.mpf)} DH</span></span><span class="val-num">${fmt(vd.mdfNM)} DH</span></div>`;
  if(isMJER(CUR)){
    h+=`<div class="val-row"><span class="val-lbl">Gherghar <span class="val-detail">(× ${fmt(750/m.ghr.pf)} DH/u)</span></span><span class="val-num">${fmt(vd.ghr)} DH</span></div>
    <div class="val-row"><span class="val-lbl">ISOREAL Blanc <span class="val-detail">(× ${fmt(115/m.iso.pf)} DH/u)</span></span><span class="val-num">${fmt(vd.isoB)} DH</span></div>
    <div class="val-row"><span class="val-lbl">ISOREAL Brute <span class="val-detail">(× ${fmt(95/m.iso.pf)} DH/u)</span></span><span class="val-num">${fmt(vd.isoR)} DH</span></div>`;
  }
  h+=`<div class="val-row" style="margin-top:4px;border-top:2px solid var(--primary);padding-top:4px">
    <span style="font-weight:800;color:var(--primary)">TOTAL (composants propres)</span>
    <span class="val-num" style="font-size:1rem;color:var(--primary)">${fmt(vd.total)} DH</span>

      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--purple)">${fmt(sh.jVal)} DH</span>
    </div>
    <div class="val-row" style="background:#faf5ff;padding:4px 6px;border-radius:5px;margin-top:2px">
      <span style="font-size:.68rem;font-weight:700;color:var(--purple)">⚡ Gharghar partagé (${sh.gharghar} pcs × ${fmt(750/203)} DH)</span>
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--purple)">${fmt(sh.ghVal)} DH</span>

    </div>`;
  }
  h+=`</div></div>`;

  // Manquants
  const mqd=getMQ(CUR,mqCoul),hm=mqd.some(x=>x.manq>0);
  h+=`<div class="mbox"><div class="mbhdr"><span class="mbht">⚠ Manquants pour 1 de plus</span>
  <div class="mqbs">${COUL.map(c=>`<button class="mqb ${c===mqCoul?'on':''}" onclick="setMQ('${c}')">${c}</button>`).join('')}</div></div>

  if(!hm)h+=`<div style="color:var(--ok);font-size:.74rem">✅ Stock suffisant pour ${mqCoul}</div>`;
  else{
    h+=`<table><thead><tr><th>Composant</th><th style="text-align:right">Stock</th>
    <th style="text-align:right">Besoin</th><th style="text-align:right">Manque</th></tr></thead><tbody>`;
    mqd.forEach(x=>{const lv=x.manq>0?'crit':'ok';

function setMQ(c){mqCoul=c;renderCenter();}

// Get options for composant selector
function getCompOptions(model){
  const m=MODS[model];
  let opts='<option value="jenab">Jenab ⚡ (13×25 — partagé)</option>';
  opts+='<option value="gharghar">Gharghar ⚡ (24×11 — partagé)</option>';
  m.mdf.filter(d=>!d.shared).forEach(d=>{
    opts+=`<option value="${d.key}">${d.nom} — ${d.dim}</option>`;
  });
  if(isMJER(model)){
    opts+=`<option value="ghr">Gherghar (${m.ghr.dim})</option>
    <option value="iso_b">ISOREAL Blanc (${m.iso.dim})</option>
    <option value="iso_r">ISOREAL Brute (${m.iso.dim})</option>`;
  }
  return opts;
}

function needsColor(comp){return comp==='jenab'||(!['gharghar','ghr','iso_b','iso_r'].includes(comp)&&comp.startsWith('mdf_'));}

function addMultiRow(){
  multiRows.push({comp:'jenab',col:'Blanc',qty:1});renderMultiRows();
}
function removeMultiRow(idx){multiRows.splice(idx,1);renderMultiRows();}
function updateMultiRow(idx,field,val){
  multiRows[idx][field]=val;
  if(field==='comp'){
    const colEl=document.getElementById(`mcol_${idx}`);
    if(colEl)colEl.style.display=needsColor(val)?'block':'none';
  }
}
function renderMultiRows(){
  const wrap=document.getElementById('multiRows');if(!wrap)return;
  wrap.innerHTML=multiRows.map((r,i)=>`<div class="multi-row">
    <select id="mcomp_${i}" onchange="updateMultiRow(${i},'comp',this.value)">${getCompOptions(CUR).replace(`value="${r.comp}"`,`value="${r.comp}" selected`)}</select>
    <select id="mcol_${i}" class="coul-mini" style="display:${needsColor(r.comp)?'block':'none'}" onchange="updateMultiRow(${i},'col',this.value)">
      ${COUL.map(c=>`<option ${c===r.col?'selected':''}>${c}</option>`).join('')}
    </select>
    <input id="mqty_${i}" type="number" min="1" value="${r.qty}" onchange="updateMultiRow(${i},'qty',+this.value||1)">
    <div class="multi-del" onclick="removeMultiRow(${i})">×</div>
  </div>`).join('');
}

function srcWrap(title,list,active,fn){
  const extra=active==='Autres'?`<div class="f" style="margin-top:3px"><label>Commentaire</label><textarea id="icomm" placeholder="Précisez..."></textarea></div>`:'';
  return `<div class="src-wrap"><div class="src-title">${title}</div>
  <div class="src-grid">${list.map(s=>`<button class="srcbtn ${s===active?'on':''}" onclick="${fn}('${s.replace(/'/g,"\\'")}')">
  ${s}</button>`).join('')}</div>${extra}</div>`;
}

function getAsmPreview(){
  const q=parseInt(document.getElementById('iq')?.value)||1;
  const missing=checkAssembly(selModel,selCoul,q);
  const el=document.getElementById('asmPreview');if(!el)return;
  if(missing.length===0){
    el.innerHTML=`<div class="asm-ok">✅ Stock suffisant — prêt à assembler ${q} ${selModel} ${selCoul}</div>`;
    const btn=document.getElementById('btnSub');if(btn)btn.disabled=false;
  } else {
    el.innerHTML=`<div class="asm-manq"><div class="asm-manq-t">⛔ Manquants pour ${q} unité(s) :</div>
    <ul>${missing.map(x=>`<li>${x.nom}${x.shared?' ⚡':''} — stock: ${x.have} / besoin: ${x.need} → manque ${x.manq}</li>`).join('')}</ul></div>`;
    const btn=document.getElementById('btnSub');if(btn)btn.disabled=true;
  }
}

    ${isSM?`<div class="dispo-wrap ${dispo===0?'crit':dispo<3?'warn':'ok'}">📦 Stock : ${dispo}</div>`:''}
    </div>
    <div class="r2">
      <div class="f"><label>Quantité</label><input type="number" id="iq" min="1" value="1" oninput="uf()"></div>
      <div class="f"><label>Date</label><input type="date" id="id" value="${new Date().toISOString().split('T')[0]}"></div>

  document.getElementById('tc').innerHTML=h;

function uf(){
  if(mvType==='sp'){
    const comp=document.getElementById('ic')?.value||'';
    const col=document.getElementById('icol')?.value||'Blanc';
    const fc=document.getElementById('fcoul');
    if(fc)fc.style.display=needsColor(comp)?'flex':'none';
    const badge=document.getElementById('dispoBadge');
    if(badge){
      let dispo=0;
      const s=getStk(CUR);
      if(comp==='jenab')dispo=s.jenab[col]||0;
      else if(comp==='gharghar')dispo=s.gharghar||0;
      else if(comp==='ghr')dispo=s.ghr||0;
      else if(comp==='iso_b')dispo=s.iso_b||0;
      else if(comp==='iso_r')dispo=s.iso_r||0;
      else dispo=s.mdf[comp]?.[col]||0;
      dispo=Math.max(0,dispo);
      const cl=dispo===0?'crit':dispo<5?'warn':'ok';
      badge.innerHTML=`<div class="dispo-wrap ${cl}">📦 Stock : ${dispo}</div>`;
      const btn=document.getElementById('btnSub');if(btn)btn.disabled=dispo<=0;
    }
  }
  if(mvType==='sm'){
    const btn=document.getElementById('btnSub');
    if(btn)btn.disabled=(getMjerC(selModel)[selCoul]||0)<=0;
  }
}

function addMv(){
  const date=document.getElementById('id')?.value||new Date().toISOString().split('T')[0];
  const tp=parseFloat(document.getElementById('itp')?.value)||0;
  const comm=document.getElementById('icomm')?.value||'';
  const trName=getTransName();
  const d=gd();

  // ASSEMBLAGE AUTO
  if(mvType==='as'){
    const q=parseInt(document.getElementById('iq')?.value)||1;
    const missing=checkAssembly(selModel,selCoul,q);
    if(missing.length>0){toast('⛔ Stock insuffisant !','crit');return;}
    const m=MODS[selModel];
    const src='Assemblage atelier';
    // Déduire pièces
    m.mdf.forEach(d_=>{
      const need=d_.pm*q;
      if(d_.shared&&d_.key==='jenab'){
        d.shared.journal=d.shared.journal||[];
        d.shared.journal.push({date,t:'sp',q:need,cat:'pieces',c:'jenab',col:selCoul,src,tr:trName||undefined});
      } else if(d_.shared&&d_.key==='gharghar'){
        d.shared.journal=d.shared.journal||[];
        d.shared.journal.push({date,t:'sp',q:need,cat:'pieces',c:'gharghar',src,tr:trName||undefined});
      } else {
        if(!d[selModel].journal)d[selModel].journal=[];
        const e={date,t:'sp',q:need,cat:'pieces',c:d_.key,src};
        if(needsColor(d_.key))e.col=selCoul;
        d[selModel].journal.push(e);
      }
    });
    if(isMJER(selModel)){
      d.shared.journal=d.shared.journal||[];
      d.shared.journal.push({date,t:'sp',q:m.gh.pm*q,cat:'pieces',c:'gharghar',src});
      d[selModel].journal.push({date,t:'sp',q:m.ghr.pm*q,cat:'pieces',c:'ghr',src});
      d[selModel].journal.push({date,t:'sp',q:m.iso.pm*q,cat:'pieces',c:'iso_b',src});
    }
    // Ajouter au stock complets
    if(!d[selModel].journal)d[selModel].journal=[];
    d[selModel].journal.push({date,t:'as',q,cat:'mjerc',col:selCoul,src:'Assemblage atelier → Stock magasin',tr:trName||undefined,tp:tp||undefined});
    sv(d);toast(`🔧 ${q} ${selModel} ${selCoul} assemblé${q>1?'s':''} ✅`,'asm');render();return;
  }

  // SORTIE COMPLET
  if(mvType==='sm'){
    const q=parseInt(document.getElementById('iq')?.value)||1;
    const dispo=Math.max(0,getMjerC(selModel)[selCoul]||0);
    if(dispo<=0){toast(`⛔ Stock ${selModel} ${selCoul} = 0 !`,'crit');return;}
    const qF=Math.min(q,dispo);
    if(q>dispo)toast(`⚠ Seulement ${dispo} dispo — ${dispo} sorti`,'warn');
    if(!d[selModel].journal)d[selModel].journal=[];
    d[selModel].journal.push({date,t:'sm',q:qF,cat:'mjerc',col:selCoul,
      src:dstSM+(comm?' : '+comm:''),tr:trName||undefined,tp:tp||undefined});
    sv(d);if(q<=dispo)toast(`📤 −${qF} ${selModel} ${selCoul} ✅`,'warn');render();return;
  }

  // ENTREE COMPLET
  if(mvType==='em'){
    const q=parseInt(document.getElementById('iq')?.value)||1;
    if(!d[selModel].journal)d[selModel].journal=[];
    d[selModel].journal.push({date,t:'em',q,cat:'mjerc',col:selCoul,
      src:entSrcEM+(comm?' : '+comm:''),tr:trName||undefined,tp:tp||undefined});
    sv(d);toast(`↩ +${q} ${selModel} ${selCoul} ✅`,'info');render();return;
  }

  // SORTIE PIECES — simple
  if(mvType==='sp'){
    const q=parseInt(document.getElementById('iq')?.value)||1;
    const comp=document.getElementById('ic')?.value||'';
    const col=document.getElementById('icol')?.value||'Blanc';
    const s=getStk(CUR);
    let dispo=0;
    if(comp==='jenab')dispo=s.jenab[col]||0;
    else if(comp==='gharghar')dispo=s.gharghar||0;
    else if(comp==='ghr')dispo=s.ghr||0;
    else if(comp==='iso_b')dispo=s.iso_b||0;
    else if(comp==='iso_r')dispo=s.iso_r||0;
    else dispo=s.mdf[comp]?.[col]||0;
    dispo=Math.max(0,dispo);
    if(dispo<=0){toast('⛔ Stock = 0 !','crit');return;}
    const qF=Math.min(q,dispo);
    if(q>dispo)toast(`⚠ Seulement ${dispo} dispo — ${dispo} sorti`,'warn');
    const src=dstSP+(comm?' : '+comm:'');
    if(comp==='jenab'||comp==='gharghar'){
      d.shared=d.shared||{};d.shared.journal=d.shared.journal||[];
      const e={date,t:'sp',q:qF,cat:'pieces',c:comp,src,tr:trName||undefined,tp:tp||undefined};
      if(comp==='jenab')e.col=col;
      d.shared.journal.push(e);
    } else {
      if(!d[CUR].journal)d[CUR].journal=[];
      const e={date,t:'sp',q:qF,cat:'pieces',c:comp,src,tr:trName||undefined,tp:tp||undefined};
      if(needsColor(comp))e.col=col;
      d[CUR].journal.push(e);
    }
    sv(d);if(q<=dispo)toast(`−${qF} enregistré ✅`,'crit');render();return;
  }

  // ENTREE PIECES — multi
  if(mvType==='ep'){
    if(multiRows.length===0){toast('⚠ Ajoutez au moins 1 composant','warn');return;}
    // sync values from DOM using IDs
    multiRows.forEach((r,i)=>{
      const compEl=document.getElementById(`mcomp_${i}`);
      const colEl=document.getElementById(`mcol_${i}`);
      const qIn=document.getElementById(`mqty_${i}`);
      if(compEl)r.comp=compEl.value;
      if(colEl&&colEl.style.display!=='none')r.col=colEl.value;
      if(qIn)r.qty=parseInt(qIn.value)||1;
    });
    const src=entSrc+(comm?' : '+comm:'');
    const groupId='grp_'+Date.now();
    // one grouped entry in journal
    const groupEntry={date,t:'ep',cat:'pieces',src,tr:trName||undefined,tp:tp||undefined,
      grouped:true,groupId,items:multiRows.map(r=>({comp:r.comp,col:r.col,qty:r.qty}))};
    // also apply to stock via individual hidden entries
    let firstTP=tp;
    multiRows.forEach((r,idx)=>{
      const e={date,t:'ep',q:r.qty,cat:'pieces',c:r.comp,src,tr:trName||undefined,
        tp:idx===0?tp||undefined:undefined,groupId};
      if(needsColor(r.comp))e.col=r.col;
      if(r.comp==='jenab'||r.comp==='gharghar'){
        d.shared=d.shared||{};d.shared.journal=d.shared.journal||[];
        d.shared.journal.push(e);
      } else {
        if(!d[CUR].journal)d[CUR].journal=[];
        d[CUR].journal.push(e);
      }
    });
    sv(d);toast(`✅ ${multiRows.length} composant${multiRows.length>1?'s':''} enregistrés !`,'ok');
    multiRows=[{comp:'jenab',col:'Blanc',qty:1}];render();return;
  }
}

// JOURNAL
function renderJn(){
  const allModel=gd()[CUR]?.journal||[];
  const allShared=gd().shared?.journal||[];
  // merge and tag
  const all=[...allModel.map(j=>({...j,_src:'model'})),
             ...allShared.map(j=>({...j,_src:'shared'}))];
  all.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const visible=all.filter(j=>!j.deleted).slice(0,60);

  // Group by groupId
  const groups={},singles=[];
  visible.forEach(j=>{
    if(j.groupId&&j.t==='ep'){
      if(!groups[j.groupId])groups[j.groupId]=[];
      groups[j.groupId].push(j);
    } else singles.push(j);
  });

  const aide=`<div class="aide"><strong>💡 Corriger une erreur</strong>
  ① Journal ② Trouver ③ "Modifier" ④ "Enregistrer" — Erreur → "Supprimer".</div>`;
  if(!visible.length){document.getElementById('tc').innerHTML=aide+`<div style="padding:15px;text-align:center;color:var(--muted);font-size:.73rem">Aucun mouvement</div>`;return;}

  const LABS={'ep':'↑ Entrée','sp':'↓ Sortie','as':'🔧 Assemblage','em':'↩ Retour','sm':'📤 Livraison'};
  // Render entries
  const rendered=new Set();
  let h=aide+`<div class="jw">`;
  visible.forEach(j=>{
    if(j.deleted)return;
    if(j.groupId&&j.t==='ep'){
      if(rendered.has(j.groupId))return;
      rendered.add(j.groupId);
      const grp=groups[j.groupId]||[];
      const firstIdx=allModel.findIndex(x=>x.groupId===j.groupId&&x.t==='ep');
      h+=`<div class="ji-group">
        <div class="ji-group-hdr">
          <span class="ji-group-t">↑ Entrée pièces — ${grp.length} composants</span>
          <span class="ji-group-sub">${j.date}${j.tr?' · 🚛 '+j.tr:''}${j.src?' · '+j.src:''}</span>
        </div>
        <div class="ji-group-rows">
          ${grp.map(g=>`<div class="ji-group-row">
            <span style="font-weight:600">${g.c==='jenab'?'Jenab ⚡':g.c==='gharghar'?'Gharghar ⚡':g.c} ${g.col?'— '+g.col:''}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--ok)">+${g.q}</span>
          </div>`).join('')}
        </div>
        <div class="jia">
          <button class="jib del" onclick="delGroup('${j.groupId}')">Supprimer tout</button>
        </div>
      </div>`;
    } else {
      const isC=j.cat==='mjerc';
      const lbl=isC?`${LABS[j.t]} — ${CUR} ${j.col}`:
                j.c==='jenab'?'Jenab ⚡':j.c==='gharghar'?'Gharghar ⚡':
                j.c==='ghr'?'Gherghar':j.c==='iso_b'?'ISOREAL Blanc':j.c==='iso_r'?'ISOREAL Brute':j.c;
      const srcIdx=j._src==='shared'?allShared.findIndex(x=>x===j):allModel.findIndex(x=>x===j);
      h+=`<div class="ji ${j.t}">
        <div class="jir">
          <div style="flex:1;min-width:0">
            <div class="jic">${lbl}${j.src?' · '+j.src:''}</div>
            <div class="jim">${j.col&&!isC?j.col+' · ':''}${j.date}${j.tr?' · 🚛 '+j.tr:''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:5px">
            <div class="jiq ${j.t}">${j.t==='ep'||j.t==='em'||j.t==='as'?'+'+j.q:'−'+j.q}</div>
            ${j.tp?`<div style="font-size:.54rem;color:var(--gold2)">${j.tp} DH</div>`:''}
          </div>
        </div>
        <div class="jia">
          <button class="jib" onclick="openEdit(${srcIdx},'${j._src}')">Modifier</button>
          <button class="jib del" onclick="delJ(${srcIdx},'${j._src}')">Supprimer</button>
        </div>
      </div>`;
    }
  });
  h+=`</div>`;
  document.getElementById('tc').innerHTML=h;
}

  const d=gd();
  (d[CUR].journal||[]).forEach(j=>{if(j.groupId===gid)j.deleted=true;});
  (d.shared.journal||[]).forEach(j=>{if(j.groupId===gid)j.deleted=true;});
  sv(d);toast('🗑 Livraison supprimée','crit');render();
}

function renderDash(){
  const d=gd();
  const sh=getSharedVal();
  const allModels=Object.keys(MODS);

  // ── VALEUR TOTALE STOCK COMPLETS (MJER assemblés)
  let valComplets=0;
  allModels.forEach(mod=>{
    const mc=getMjerC(mod);
    COUL.forEach(c=>{
      valComplets+=( mc[c]||0)*getPR(mod,c);
    });
  });

  // ── VALEUR TOTALE PIÈCES
  const valPieces=allModels.reduce((a,mod)=>a+getValDetail(mod).total,0)+sh.total;

  // ── VALEUR BARDAGE
  const bardStk=getBardStk();
  const valBard=bardStk*BARD_PRIX_MRC;

  // ── VALEUR TOTALE STOCK GLOBAL
  const valTotal=valPieces+valComplets+valBard;

  // ── FRAIS TRANSPORT TOTAL
  const transport=getTotalTrans();

  // ── MJER LE PLUS VENDU (t:'sm')
  const ventesMJER={};
  allModels.filter(m=>isMJER(m)).forEach(mod=>{
    const total=(d[mod].journal||[]).filter(j=>!j.deleted&&j.t==='sm').reduce((a,j)=>a+(+j.q||0),0);
    if(total>0)ventesMJER[mod]=total;
  });
  const topMJER=Object.entries(ventesMJER).sort((a,b)=>b[1]-a[1]);

  // ── NICHE LA PLUS VENDUE
  const ventesNICHE={};
  allModels.filter(m=>isNICHE(m)).forEach(mod=>{
    const total=(d[mod].journal||[]).filter(j=>!j.deleted&&j.t==='sm').reduce((a,j)=>a+(+j.q||0),0);
    if(total>0)ventesNICHE[mod]=total;
  });
  const topNICHE=Object.entries(ventesNICHE).sort((a,b)=>b[1]-a[1]);

  // ── FOURNISSEUR LE PLUS UTILISÉ (entrées pièces ep)
  const fournMap={};
  allModels.forEach(mod=>{
    (d[mod].journal||[]).filter(j=>!j.deleted&&j.t==='ep'&&j.src).forEach(j=>{
      const src=j.src.split(' : ')[0].trim();
      fournMap[src]=(fournMap[src]||0)+(+j.q||1);
    });
  });
  (d.shared?.journal||[]).filter(j=>!j.deleted&&j.t==='ep'&&j.src).forEach(j=>{
    const src=j.src.split(' : ')[0].trim();
    fournMap[src]=(fournMap[src]||0)+(+j.q||1);
  });
  const topFourn=Object.entries(fournMap).sort((a,b)=>b[1]-a[1]);

  // ── VENTES PAR MODÈLE (toutes)

    <div class="dkpi-v" style="font-size:1rem">${topFourn[0]?topFourn[0][0]:'—'}</div>

    <div class="dkpi"><div class="dkpi-l">🏭 Top fournisseurs</div>
    <div style="margin-top:6px">
    ${topFourn.slice(0,5).map(([f,q])=>{const p=Math.round((q/Math.max(...topFourn.map(x=>x[1]),1))*100);
      return `<div class="dbar-row"><span class="dbar-lbl">${f}</span>

// ========== BARDAGE ==========
const BARD_PRIX_UNITE = 95;
const BARD_DIV        = 4;
const BARD_PRIX_MRC   = BARD_PRIX_UNITE / BARD_DIV;
const BARD_SEUIL      = 10;
const BARD_COUL       = ['Blanc','Sonoma','Noir','Marron'];
const BARD_CLR        = {Blanc:'#475569',Sonoma:'#b45309',Noir:'#1e293b',Marron:'#78350f'};

let bardType='ep', bardSrc='', bardDst='', bardCoul='Blanc';

// Stock par couleur
function getBardStkCoul(d){
  const s={Blanc:0,Sonoma:0,Noir:0,Marron:0};
  (d.bardage?.journal||[]).filter(j=>!j.deleted).forEach(j=>{
    const col=j.col||'Blanc';
    if(s[col]===undefined)s[col]=0;
    s[col]+= j.t==='ep' ? +j.q : -(+j.q);
  });
  BARD_COUL.forEach(col=>{ s[col]=Math.max(0,s[col]); });
  return s;
}
function getBardStk(){
  const s=getBardStkCoul(gd());
  return Object.values(s).reduce((a,b)=>a+b,0);
}

// LEFT
function renderBardageLeft(){
  const d=gd(), stks=getBardStkCoul(d);
  const total=Object.values(stks).reduce((a,b)=>a+b,0);
  document.getElementById('lhdr').textContent='🪵 Bardage';
  let h='';
  BARD_COUL.forEach(col=>{
    const stk=stks[col], clr=BARD_CLR[col];
    const lv=stk===0?'crit':stk<BARD_SEUIL?'warn':'ok';
    const p=Math.min(100,(stk/(BARD_SEUIL*2))*100);
    h+='<div class="cc '+lv+'" style="border-color:'+clr+'">'+
      '<div class="cct"><span class="ccn" style="color:'+clr+'">🪵 '+col+'</span><span class="ccd">'+stk+' mrc</span></div>'+
      '<div class="cbars"><div class="cbr"><span class="cbl">Stock</span>'+

      '<span class="cbv" style="color:'+clr+'">'+stk+'</span></div></div>'+
      '<span class="ccs '+lv+'">'+(lv==='crit'?'🔴':lv==='warn'?'🟡':'✅')+' seuil '+BARD_SEUIL+'</span>'+

      '💰 Valeur totale : <strong>'+fmt(total*BARD_PRIX_MRC)+' DH</strong>'+

}

  h+='<div class="slbl" style="color:#b45309">📊 Sorties par couleur</div>'+

  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+
    '<div class="bard-card"><div class="bard-l">Total stock</div>'+
      '<div class="bard-v">'+total+' mrc</div><div class="bard-s">'+fmt(total*BARD_PRIX_MRC)+' DH</div></div>'+
    '<div class="bard-card"><div class="bard-l">+ Couleur sortie</div>'+
      '<div class="bard-v" style="font-size:1rem;color:'+(topEntry&&topEntry[1]>0?BARD_CLR[topEntry[0]]:'var(--muted)')+'">'+
        (topEntry&&topEntry[1]>0?topEntry[0]:'—')+'</div>'+
      '<div class="bard-s">'+(topEntry&&topEntry[1]>0?topEntry[1]+' morceaux':'Pas encore')+'</div>'+
    '</div></div>';

  h+='<div class="slbl" style="color:#b45309">📋 Historique</div>'+
    '<div id="bardJn" style="max-height:320px;overflow-y:auto"></div></div>';

  const d=gd();

}

function setBardT(t){bardType=t;renderBardageRight();}

function updBardPreview(){
  const q=parseInt(document.getElementById('bq')?.value)||1;
  const el=document.getElementById('bardPreview'); if(!el)return;
  if(bardType==='ep'){
    const morceaux=q*BARD_DIV;
    el.style.cssText='display:block;background:#f0fdf4;border:1px solid var(--ok);color:var(--ok);border-radius:6px;padding:6px 10px;font-size:.7rem;font-weight:700;margin-bottom:6px';
    el.textContent='✅ '+q+' unité'+(q>1?'s':'')+' → +'+morceaux+' morceaux '+bardCoul;
  } else {
    const stk=getBardStkCoul(gd())[bardCoul]||0, ok=q<=stk;
    el.style.cssText='display:block;background:'+(ok?'#f0fdf4':'#fee2e2')+';border:1px solid '+(ok?'var(--ok)':'var(--crit)')+';color:'+(ok?'var(--ok)':'var(--crit)')+';border-radius:6px;padding:6px 10px;font-size:.7rem;font-weight:700;margin-bottom:6px';
    el.textContent=ok?'✅ Sortie '+q+' morceau'+(q>1?'x':'')+' '+bardCoul+' — restant: '+(stk-q):'⛔ Stock '+bardCoul+' insuffisant ! Dispo: '+stk;
  }
}

function addBardMv(){
  const q=parseInt(document.getElementById('bq')?.value)||1;
  const date=document.getElementById('bd')?.value||new Date().toISOString().split('T')[0];
  const tp=parseFloat(document.getElementById('btp')?.value)||0;
  const comm=document.getElementById('bcomm')?.value||'';
  const trName=getTransName();
  const d=gd();
  if(!d.bardage)d.bardage={journal:[]};
  if(!d.bardage.journal)d.bardage.journal=[];
  if(bardType==='ep'){
    const morceaux=q*BARD_DIV;
    const src=bardSrc+(comm?' : '+comm:'');
    d.bardage.journal.push({date,t:'ep',q:morceaux,col:bardCoul,unites:q,src,tr:trName||undefined,tp:tp||undefined});
    sv(d);toast('📦 +'+morceaux+' mrc '+bardCoul+' ✅','ok');render();
  } else {
    const stks=getBardStkCoul(d), stk=stks[bardCoul]||0;
    if(q>stk){toast('⛔ Stock '+bardCoul+' insuffisant ! Dispo: '+stk,'crit');return;}
    const dst=bardDst+(comm?' : '+comm:'');
    d.bardage.journal.push({date,t:'sp',q,col:bardCoul,src:dst,tr:trName||undefined,tp:tp||undefined});
    sv(d);toast('📤 −'+q+' mrc '+bardCoul+' ✅','warn');render();
  }
}

function render(){
  renderNav();
  if(CUR==='BARDAGE'){
    renderBardageLeft();
    renderBardageCenter();
    renderBardageRight();
  } else {
    renderLeft();renderCenter();if(tab==='mv')renderMv();else renderJn();
  }
}
function resetAll(){if(confirm('Supprimer toutes les données ?')){localStorage.removeItem('dv12');toast('Reset ✅','ok');render();}}
function exportCSV(){
  const d=gd();
  let csv='Article,Date,Type,Composant,Couleur,Quantité,Source,Transporteur,Prix Transport\n';
  const addRows=(jrn,art)=>(jrn||[]).forEach(j=>{
    if(j.deleted)return;
    const tp={'ep':'Entrée pièces','sp':'Sortie pièces','as':'Assemblage','em':'Entrée complet','sm':'Sortie complet'}[j.t]||j.t;
    csv+=`${art},${j.date},${tp},${j.c||''},${j.col||''},${j.q||1},"${j.src||''}","${j.tr||''}",${j.tp||0}\n`;
  });
  Object.keys(d).forEach(m=>{if(m!=='shared')addRows(d[m].journal,m);});
  addRows(d.shared?.journal,'PARTAGÉ');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`decorel_${new Date().toISOString().split('T')[0]}.csv`;a.click();toast('Export ✅','ok');
}
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===document.getElementById('mbg'))closeM();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeM();
  if(e.key==='Enter'&&document.getElementById('LS').style.display!=='none')login();
});
</script>
